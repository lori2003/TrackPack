<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="description" content="Gestisci e controlla i codici tracking dei tuoi pacchi.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TrackPack">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="stylesheet" href="./app.css">
  <title>TrackPack</title>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">▣</div>
        <div>
          <h1>TrackPack</h1>
          <p id="storageLabel">Salvati su questo dispositivo</p>
        </div>
      </div>
      <div class="connection" id="connectionStatus" aria-live="polite">● Online</div>
    </div>
  </header>

  <main class="container">
    <div class="warning hidden" id="storageWarning" role="alert">
      Il browser sta bloccando il salvataggio locale. L’app funziona, ma le modifiche potrebbero sparire dopo la chiusura.
    </div>

    <label class="search-wrap" aria-label="Cerca pacchi">
      <span aria-hidden="true">⌕</span>
      <input id="searchInput" type="search" placeholder="Cerca per codice, descrizione o corriere…" autocomplete="off">
    </label>

    <section class="toolbar" aria-label="Visualizzazione e ordinamento">
      <div class="tabs" role="tablist" aria-label="Pacchi">
        <button class="tab active" id="activeTab" data-view="active" role="tab" aria-selected="true">Attivi <span id="activeCount" class="count">0</span></button>
        <button class="tab" id="archivedTab" data-view="archived" role="tab" aria-selected="false">Archiviati</button>
      </div>
      <label class="sort-label">
        <span class="sr-only">Ordina</span>
        <select id="sortSelect">
          <option value="dateDesc">Più recenti</option>
          <option value="dateAsc">Meno recenti</option>
          <option value="nameAsc">Nome A–Z</option>
          <option value="nameDesc">Nome Z–A</option>
        </select>
      </label>
    </section>

    <nav class="filters" id="statusFilters" aria-label="Filtra per stato"></nav>

    <section id="packageList" class="package-list" aria-live="polite"></section>
  </main>

  <button class="fab" id="openAddDialog" type="button">＋ <span>Aggiungi pacco</span></button>

  <dialog id="addDialog" class="modal">
    <form id="addForm" method="dialog">
      <div class="modal-head">
        <div>
          <h2>Nuovo pacco</h2>
          <p>Inserisci i dati del pacco da seguire.</p>
        </div>
        <button class="icon-button" type="button" data-close="addDialog" aria-label="Chiudi">×</button>
      </div>

      <label class="field">
        <span>Codice tracking <b>*</b></span>
        <input id="trackingCode" name="trackingCode" maxlength="100" placeholder="Es. 827049017600018049468336" autocomplete="off" required>
        <small>I codici numerici di 24 cifre vengono riconosciuti automaticamente come INPOST.</small>
      </label>

      <fieldset class="field">
        <legend>Corriere <b>*</b></legend>
        <div class="carrier-grid" id="carrierGrid"></div>
        <input type="hidden" id="carrier" name="carrier" required>
      </fieldset>

      <label class="field">
        <span>Descrizione <em>(opzionale)</em></span>
        <input id="description" name="description" maxlength="255" placeholder="Es. Ordine abbigliamento">
      </label>

      <details class="advanced">
        <summary>Dettagli avanzati</summary>
        <div class="advanced-grid">
          <label class="field"><span>Mittente</span><input id="origin" name="origin" maxlength="255" placeholder="Es. Milano"></label>
          <label class="field"><span>Destinatario</span><input id="destination" name="destination" maxlength="255" placeholder="Es. Roma"></label>
          <label class="field"><span>Consegna stimata</span><input id="estimatedDelivery" name="estimatedDelivery" type="date"></label>
        </div>
      </details>

      <p class="form-error hidden" id="formError" role="alert"></p>
      <div class="modal-actions">
        <button class="button secondary" type="button" data-close="addDialog">Annulla</button>
        <button class="button primary" type="submit">Salva</button>
      </div>
    </form>
  </dialog>

  <dialog id="statusDialog" class="modal small">
    <form id="statusForm" method="dialog">
      <div class="modal-head">
        <div><h2>Aggiorna stato</h2><p id="statusDescription"></p></div>
        <button class="icon-button" type="button" data-close="statusDialog" aria-label="Chiudi">×</button>
      </div>
      <label class="field">
        <span>Nuovo stato</span>
        <select id="statusSelect">
          <option value="pending">In attesa</option>
          <option value="in_transit">In transito</option>
          <option value="out_for_delivery">In consegna</option>
          <option value="delivered">Consegnato</option>
          <option value="exception">Problema</option>
        </select>
      </label>
      <div class="modal-actions">
        <button class="button secondary" type="button" data-close="statusDialog">Annulla</button>
        <button class="button primary" type="submit">Salva</button>
      </div>
    </form>
  </dialog>

  <dialog id="deleteDialog" class="modal small">
    <form id="deleteForm" method="dialog">
      <div class="modal-head"><div><h2>Elimina pacco</h2><p id="deleteDescription"></p></div></div>
      <div class="modal-actions">
        <button class="button secondary" type="button" data-close="deleteDialog">Annulla</button>
        <button class="button danger" type="submit">Elimina</button>
      </div>
    </form>
  </dialog>

  <template id="emptyTemplate">
    <div class="empty-state"><div aria-hidden="true">▣</div><h2>Nessun pacco</h2><p></p></div>
  </template>

  <script src="./app.js" defer></script>
</body>
</html>
